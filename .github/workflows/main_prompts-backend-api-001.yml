name: Build and deploy Node.js app to Azure Web App - prompts-backend-api-001

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm install
        working-directory: backend

      - name: Generate Prisma Client
        # This creates the database folder Azure is missing
        run: npx prisma generate
        working-directory: backend

      - name: Fix Permissions
        # This prevents the "Permission Denied" error in Azure logs
        run: chmod -R +x node_modules/.bin
        working-directory: backend

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: backend/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'Production'
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: .

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_E27F8FC928BB4F47BF5D03EFA3B873A8 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_EF9A34894F394219A98F48A91964DC61 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_22AC53C9A5314F18B2704D60E7759416 }}

      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'prompts-backend-api-001'
          slot-name: 'Production'
          package: .