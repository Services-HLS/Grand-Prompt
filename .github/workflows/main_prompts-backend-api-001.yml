name: Build and deploy Node.js app to Azure Web App - prompts-backend-api-001

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  # This stops the Node.js version warning
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Build Backend
        # This "working-directory" tells GitHub to enter the backend folder first
        working-directory: backend
        run: |
          npm ci

      - name: Upload for Azure
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          # We only upload the backend folder, making it the "Root" for Azure
          path: backend/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download
        uses: actions/download-artifact@v4
        with:
          name: node-app
          # Download files to the current spot
          path: .

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_E27F8FC928BB4F47BF5D03EFA3B873A8 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_EF9A34894F394219A98F48A91964DC61 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_22AC53C9A5314F18B2704D60E7759416 }}

      - name: Deploy
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'prompts-backend-api-001'
          # Deploy everything we just downloaded
          package: .
